{% extends "base.html" %}

{% block title %}Sign up · DashAI{% endblock %}

{% block content %}
  <section class="mx-auto max-w-md rounded-xl bg-white p-5 shadow">
    <h1 class="text-2xl font-bold tracking-tight">Create your account</h1>
    <p class="mt-1 text-sm text-slate-600">Start from spreadsheets and ship shareable dashboards fast.</p>

    <form method="post" class="mt-4 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label for="id_username" class="mb-1 block text-sm font-medium">Username</label>
        <input type="text" name="username" id="id_username" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <div>
        <label for="id_email" class="mb-1 block text-sm font-medium">Email</label>
        <input type="email" name="email" id="id_email" class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <div>
        <label for="id_password1" class="mb-1 block text-sm font-medium">Password</label>
        <input type="password" name="password1" id="id_password1" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <div>
        <label for="id_password2" class="mb-1 block text-sm font-medium">Confirm Password</label>
        <input type="password" name="password2" id="id_password2" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <button type="submit" class="inline-flex w-full justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Create Account</button>
    </form>

    <p class="mt-4 text-center text-sm text-slate-600">Already have an account? <a class="font-medium text-blue-700" href="{% url 'login' %}">Login</a></p>
  </section>
{% endblock %}
