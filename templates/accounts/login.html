{% extends "base.html" %}

{% block title %}Login · DashAI{% endblock %}

{% block content %}
  <section class="mx-auto max-w-md card">
    <h1 class="text-2xl font-bold tracking-tight">Welcome back</h1>
    <p class="mt-1 text-sm text-slate-600">Login to continue building dashboards.</p>

    <form method="post" class="mt-4 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label for="id_username" class="mb-1 block text-sm font-medium">Username</label>
        <input type="text" name="username" id="id_username" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <div>
        <label for="id_password" class="mb-1 block text-sm font-medium">Password</label>
        <input type="password" name="password" id="id_password" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
      </div>
      <button type="submit" class="btn-primary w-full justify-center">Login</button>
    </form>

    <p class="mt-4 text-center text-sm text-slate-600">New here? <a class="font-medium text-blue-700" href="{% url 'signup' %}">Create account</a></p>
  </section>
{% endblock %}
