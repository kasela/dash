{% extends "base.html" %}

{% block title %}Upload Dataset{% endblock %}

{% block content %}
  <div class="space-y-4">
    <div class="rounded-xl bg-white p-5 shadow">
      <h1 class="text-2xl font-bold">Upload Dataset</h1>
      <form
        class="mt-4 flex flex-wrap items-center gap-3"
        hx-post="{% url 'dataset-upload-result' %}"
        hx-target="#upload-result"
        hx-swap="innerHTML"
        enctype="multipart/form-data"
      >
        {% csrf_token %}
        <input class="rounded border px-3 py-2" type="file" name="dataset_file" accept=".csv,.xlsx,.xlsm,.json" required />
        <button class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700" type="submit">Parse file</button>
        <span class="spinner text-sm text-slate-500">Parsing…</span>
      </form>
    </div>

    <div id="upload-result" class="rounded-xl bg-white p-5 shadow">
      <em class="text-slate-500">No file parsed yet.</em>
    </div>
  </div>
{% endblock %}
