{% load static %}
<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI Dashboard Builder{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'dist/tailwind.css' %}" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="{% static 'js/charts.js' %}"></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-800 antialiased">
    <main class="mx-auto min-h-full w-full max-w-6xl p-5 md:p-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
