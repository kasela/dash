{% extends "base.html" %}

{% block title %}Dashboard Home{% endblock %}

{% block content %}
  <div class="space-y-5">
    <div class="rounded-xl bg-white p-5 shadow">
      <h1 class="text-2xl font-bold">AI Dashboard Builder</h1>
      <p class="mt-2 text-sm text-slate-600">Start by uploading a CSV, XLSX/XLSM, or JSON file.</p>
      <a class="mt-4 inline-block rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700" href="{% url 'dataset-upload' %}">
        Upload dataset
      </a>
    </div>

    <div class="rounded-xl bg-white p-5 shadow">
      <h2 class="text-xl font-semibold">Sample responsive chart</h2>
      {{ chart_config|json_script:"chart-config" }}
      <div class="mt-3 h-80">
        <canvas id="home-chart"></canvas>
      </div>
    </div>
  </div>
{% endblock %}
