{% extends "base.html" %}

{% block title %}Shared Dashboard{% endblock %}

{% block content %}
  <section class="rounded-xl bg-white p-5 shadow">
    <h1 class="text-2xl font-bold">{{ dashboard.title }}</h1>
    <p class="mt-1 text-sm text-slate-500">Public shared view</p>
  </section>

  <section class="mt-4 grid gap-3">
    {% for widget in widgets %}
      <div class="rounded-xl bg-white p-4 shadow">
        <h2 class="font-semibold">{{ widget.title }}</h2>
        <pre class="mt-2 overflow-auto rounded bg-slate-50 p-2 text-xs">{{ widget.chart_config }}</pre>
      </div>
    {% empty %}
      <p>No widgets found.</p>
    {% endfor %}
  </section>
{% endblock %}
